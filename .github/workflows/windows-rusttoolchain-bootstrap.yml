name: Windows RustToolChain bootstrap

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-rusttoolchain-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-bootstrap-without-system-rust:
    name: Julia ${{ matrix.julia-version }} / Windows / no system Rust
    runs-on: windows-2025

    strategy:
      fail-fast: false
      matrix:
        julia-version:
          - 'lts'
          - '1'

    env:
      JULIA_NUM_THREADS: auto

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}
          arch: x64

      - name: Show initial Rust state
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"

          Write-Host "Initial PATH:"
          Write-Host $env:PATH

          Write-Host "Initial rustup:"
          Get-Command rustup -ErrorAction SilentlyContinue | Format-List *

          Write-Host "Initial cargo:"
          Get-Command cargo -ErrorAction SilentlyContinue | Format-List *

          Write-Host "Initial rustc:"
          Get-Command rustc -ErrorAction SilentlyContinue | Format-List *

          if (Get-Command rustup -ErrorAction SilentlyContinue) {
            rustup --version
          }

          if (Get-Command cargo -ErrorAction SilentlyContinue) {
            cargo --version
          }

          if (Get-Command rustc -ErrorAction SilentlyContinue) {
            rustc --version
          }

      - name: Remove preinstalled Rust managed by rustup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"

          if (Get-Command rustup -ErrorAction SilentlyContinue) {
            Write-Host "Running: rustup self uninstall -y"
            rustup self uninstall -y
          } else {
            Write-Host "rustup is not visible; skipping rustup self uninstall"
          }

          Write-Host "Removing user Rust directories if they exist"
          Remove-Item -Recurse -Force "$env:USERPROFILE\.cargo" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:USERPROFILE\.rustup" -ErrorAction SilentlyContinue

      - name: Hide remaining Rust paths from PATH
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $filtered = $env:PATH -split ';' | Where-Object {
            $_ -and
            ($_ -notmatch '\\\.cargo\\bin') -and
            ($_ -notmatch '\\\.rustup') -and
            ($_ -notmatch '\\Rust\\') -and
            ($_ -notmatch '\\rustup\\') -and
            ($_ -notmatch 'hostedtoolcache\\windows\\Rust')
          }

          $newPath = ($filtered -join ';')
          "PATH=$newPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Scratch.jl / artifact cache を通常 CI と分離する。
          # RustToolChain.jl の Windows installer fallback が fresh に走ることを狙う。
          $depot = Join-Path $env:RUNNER_TEMP "julia-depot-rusttoolchain-bootstrap"
          "JULIA_DEPOT_PATH=$depot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Filtered PATH:"
          Write-Host $newPath

          Write-Host "Isolated JULIA_DEPOT_PATH:"
          Write-Host $depot

      - name: Assert no system Rust is visible
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (Get-Command cargo -ErrorAction SilentlyContinue) {
            Get-Command cargo -ErrorAction SilentlyContinue | Format-List *
            throw "cargo is still visible in PATH"
          }

          if (Get-Command rustc -ErrorAction SilentlyContinue) {
            Get-Command rustc -ErrorAction SilentlyContinue | Format-List *
            throw "rustc is still visible in PATH"
          }

          if (Get-Command rustup -ErrorAction SilentlyContinue) {
            Get-Command rustup -ErrorAction SilentlyContinue | Format-List *
            throw "rustup is still visible in PATH"
          }

          julia -e '
            @info "Julia version" VERSION
            @info "Sys.which cargo" Sys.which("cargo")
            @info "Sys.which rustc" Sys.which("rustc")
            @info "Sys.which rustup" Sys.which("rustup")

            @assert Sys.which("cargo") === nothing
            @assert Sys.which("rustc") === nothing
            @assert Sys.which("rustup") === nothing
          '

      - name: Instantiate package
        shell: pwsh
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
            Pkg.status()
          '

      - name: Test RustToolChain.jl Windows installer fallback
        shell: pwsh
        run: |
          julia --project=. -e '
            using RustToolChain: cargo, rustc

            @assert Sys.which("cargo") === nothing
            @assert Sys.which("rustc") === nothing

            c = cargo()
            r = rustc()

            @info "cargo() command" c
            @info "rustc() command" r

            run(`$c --version`)
            run(`$r --version`)
          '

      - name: Run package tests without system Rust
        shell: pwsh
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.test()
          '
